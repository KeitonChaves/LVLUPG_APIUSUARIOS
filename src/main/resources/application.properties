spring.application.name=apiusuarios

# ==========================================
# DATASOURCE - MySQL
# ==========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://10.0.141.76:3306/levelupgamer_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true
spring.datasource.username=root
spring.datasource.password=Innovatech2024!

# ==========================================
# HIKARICP - Connection Pool optimizado
# ==========================================
spring.datasource.hikari.pool-name=HikariPool-Usuarios
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ==========================================
# JPA / HIBERNATE optimizado
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Batch inserts/updates
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Cache de segundo nivel
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# Estadísticas (desactivar en producción)
spring.jpa.properties.hibernate.generate_statistics=false

# Evitar N+1 queries
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# ==========================================
# SEGURIDAD
# ==========================================
api.key=lvlupgamer1306
security.api.key.enabled=true

# ==========================================
# SERVIDOR
# ==========================================
server.port=8082
server.tomcat.max-threads=50
server.tomcat.min-spare-threads=10
server.tomcat.connection-timeout=20000
server.tomcat.accept-count=100

# ==========================================
# ARCHIVOS
# ==========================================
spring.servlet.multipart.max-file-size=1000MB
spring.servlet.multipart.max-request-size=1000MB
spring.servlet.multipart.enabled=true